{% extends 'generic_page.html' %}

{% block page_title %}Get in Touch{% endblock %}

{% block page_content %}
<div class="contact-page-wrapper">
    <p class="contact-subtitle">We'd love to hear from you. Send us a message and we'll reply shortly.</p>

    <section class="contact-card">
        <form id="ajax-contact-form" data-endpoint="{{ url_for('pages.contact') }}" class="contact-form">
            <div class="form-group">
                <label for="contact-name">Full Name</label>
                <input type="text" id="contact-name" name="name" placeholder="John Doe" required>
                <span class="error-feedback" id="error-name"></span>
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label for="contact-email">Email Address</label>
                    <input type="email" id="contact-email" name="email" placeholder="john@example.com" required>
                    <span class="error-feedback" id="error-email"></span>
                </div>
                <div class="form-group">
                    <label for="contact-phone">Contact Number</label>
                    <input type="tel" id="contact-phone" name="phone" placeholder="+1 (555) 000-0000" required>
                    <span class="error-feedback" id="error-phone"></span>
                </div>
            </div>
            <div class="form-group full">
                <label for="contact-message">Message</label>
                <textarea id="contact-message" name="message" rows="6" placeholder="How can we help you?" required></textarea>
                <span class="error-feedback" id="error-message"></span>
            </div>
            <button type="submit" class="btn-primary contact-submit">Send Message ✨</button>
        </form>
    </section>
</div>

<!-- Floating Notification Container -->
<div id="notification-container" style="position: fixed; top: 120px; left: 50%; transform: translateX(-50%); z-index: 10001; display: flex; flex-direction: column; align-items: center; gap: 15px; pointer-events: none; width: 100%; max-width: 600px; padding: 0 20px;"></div>

<script>
document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('ajax-contact-form');
    const notificationContainer = document.getElementById('notification-container');
    
    function showNotification(message, type = 'success') {
        const toast = document.createElement('div');
        toast.className = `contact-${type} floating-toast`;
        toast.innerHTML = `
            <div style="flex-grow: 1;">${message}</div>
            <span style="cursor: pointer; font-size: 1.5rem; margin-left: 20px; line-height: 1; font-weight: bold;" onclick="this.parentElement.remove()">×</span>
        `;
        toast.style.pointerEvents = 'auto';
        toast.style.display = 'flex';
        toast.style.alignItems = 'center';
        toast.style.justifyContent = 'space-between';
        toast.style.textAlign = 'center';
        toast.style.padding = '18px 25px';
        notificationContainer.appendChild(toast);
        
        // Remove after 30 seconds (30000ms)
        setTimeout(() => {
            if (toast.parentElement) {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 500);
            }
        }, 30000);
    }

    // Handle initial Flask flashes via the floating system
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                showNotification({{ message|tojson }}, "{{ category }}");
            {% endfor %}
        {% endif %}
    {% endwith %}
    
    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        // Reset previous errors
        document.querySelectorAll('.error-feedback').forEach(el => el.textContent = '');
        document.querySelectorAll('.form-group input, .form-group textarea').forEach(el => el.classList.remove('field-error'));
        
        try {
            const { response, result } = await window.AyuraApi.jsonRequest(form.dataset.endpoint, {
                method: 'POST',
                data: window.AyuraApi.formToJson(form),
            });
            
            if (response.ok) {
                showNotification(result.message, 'success');
                form.reset();
            } else {
                if (result.errors) {
                    for (const [field, msg] of Object.entries(result.errors)) {
                        const errorEl = document.getElementById(`error-${field}`);
                        const inputEl = document.getElementsByName(field)[0];
                        if (errorEl) errorEl.textContent = msg;
                        if (inputEl) inputEl.classList.add('field-error');
                    }
                    showNotification('Please correct the errors in the form.', 'error');
                } else if (result.error) {
                    showNotification(result.error, 'error');
                }
            }
        } catch (err) {
            showNotification('Failed to send message. Please try again later.', 'error');
        }
    });
});
</script>
{% endblock %}
